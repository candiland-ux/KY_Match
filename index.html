<!DOCTYPE html>
<html lang="en" style="color-scheme: light only;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#ffffff">
<title>Kentucky 2026 Election Matcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light only; }
  html, body { background: #ffffff !important; color: #111 !important; -webkit-text-fill-color: #111; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    background: #ffffff !important;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    background: #ffffff !important;
  }

  /* ==================== TYPOGRAPHY ==================== */
  h1, h2, h3 { color: #111 !important; -webkit-text-fill-color: #111; margin: 0; }
  p { color: #222 !important; -webkit-text-fill-color: #222; }

  .brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #b8321a !important;
    -webkit-text-fill-color: #b8321a;
    margin-bottom: 12px;
  }
  .hero-title {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .hero-sub {
    font-size: 16px;
    color: #555 !important;
    -webkit-text-fill-color: #555;
    margin-bottom: 24px;
  }

  /* ==================== STATS GRID ==================== */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
    padding: 18px;
    background: #f7f6f3 !important;
    border-radius: 10px;
  }
  .stat-item { text-align: center; }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    display: block;
  }
  .stat-label {
    font-size: 11px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 3px;
  }

  /* ==================== HOW IT WORKS ==================== */
  .how-list { margin: 0 0 24px 0; padding: 0; list-style: none; counter-reset: step; }
  .how-list li {
    counter-increment: step;
    padding-left: 36px;
    position: relative;
    margin-bottom: 12px;
    font-size: 15px;
    color: #222 !important;
    -webkit-text-fill-color: #222;
  }
  .how-list li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    top: 0;
    width: 24px;
    height: 24px;
    background: #1a1a1a !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  /* ==================== PRIMARY BUTTON ==================== */
  .primary-btn {
    display: block;
    width: 100%;
    padding: 16px 24px;
    background: #c8441c !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    transition: background-color 0.15s;
  }
  .primary-btn:hover, .primary-btn:active { background: #a0361a !important; }
  .primary-btn:disabled { background: #bbb !important; cursor: not-allowed; }

  .secondary-btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: #ffffff !important;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    border: 1.5px solid #111;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background-color 0.15s;
  }
  .secondary-btn:hover, .secondary-btn:active { background: #f5f5f5 !important; }

  /* ==================== DISCLAIMER ==================== */
  .disclaimer {
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    font-style: italic;
    text-align: center;
    margin-top: 24px;
    padding: 0 20px;
  }

  /* ==================== QUESTION SCREEN ==================== */
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 12px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .progress-text { font-weight: 600; }
  .progress-bar {
    flex: 1;
    margin-left: 16px;
    height: 4px;
    background: #eee !important;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #c8441c !important;
    transition: width 0.3s ease;
  }

  .q-title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .q-sub {
    font-size: 15px;
    color: #555 !important;
    -webkit-text-fill-color: #555;
    margin-bottom: 18px;
  }
  .multi-helper {
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    font-style: italic;
    margin-bottom: 14px;
  }
  .multi-helper strong { color: #c8321a !important; -webkit-text-fill-color: #c8321a; font-weight: 700; font-style: normal; }

  /* ==================== OPTIONS ==================== */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .opt {
    background: #fff !important;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.4;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    width: 100%;
    transition: border-color 0.15s, background 0.15s;
  }
  .opt:hover { border-color: #111; }
  .opt.selected {
    border-color: #c8321a;
    background: #fef5f2 !important;
  }
  .opt strong {
    display: block;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 2px;
    color: #111 !important;
    -webkit-text-fill-color: #111;
  }
  .opt small {
    display: block;
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
  }
  .rank-badge {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    background: #c8321a !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    margin-right: 8px;
    vertical-align: middle;
  }

  .continue-btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: #c8321a !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    margin-bottom: 12px;
    transition: background-color 0.15s;
  }
  .continue-btn:hover, .continue-btn:active { background: #a0260f !important; }
  .continue-btn:disabled { background: #ccc !important; cursor: not-allowed; }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }
  .back-btn {
    background: transparent;
    border: none;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 8px 12px;
  }
  .back-btn:hover:not(:disabled) { color: #111 !important; -webkit-text-fill-color: #111; }
  .back-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-hint { font-size: 13px; color: #888 !important; -webkit-text-fill-color: #888; }

  /* ==================== DISTRICT PICKER ==================== */
  select.district-picker {
    width: 100%;
    padding: 14px 16px;
    font-family: inherit;
    font-size: 15px;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    background: #fff !important;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23111' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 16px center;
    background-size: 20px;
  }
  .district-picker:focus { outline: none; border-color: #c8321a; }
  .district-lookup {
    display: inline-block;
    margin-bottom: 16px;
    font-size: 14px;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    text-decoration: underline;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
  }

  /* ==================== INFO BOX ==================== */
  .info-box {
    padding: 12px 14px;
    background: #fff8e1 !important;
    border-left: 3px solid #c8921a;
    border-radius: 4px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.5;
    color: #4a3a1a !important;
    -webkit-text-fill-color: #4a3a1a;
  }
  .info-box strong { color: #2a200a !important; -webkit-text-fill-color: #2a200a; }

  /* ==================== TOGGLE (party show-both) ==================== */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    background: #f7f6f3 !important;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .toggle {
    position: relative;
    display: inline-block;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #ccc !important;
    border-radius: 24px;
    transition: 0.2s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    height: 18px;
    width: 18px;
    left: 3px;
    top: 3px;
    background: #fff !important;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: #c8321a !important; }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
  .toggle-label { font-size: 13px; color: #555 !important; -webkit-text-fill-color: #555; }
  .toggle-label strong { color: #111 !important; -webkit-text-fill-color: #111; }

  /* ==================== RESULT PAGE ==================== */
  .result-head {
    text-align: center;
    margin-bottom: 24px;
    padding: 24px 20px;
    background: #f7f6f3 !important;
    border-radius: 12px;
  }
  .result-kicker {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    margin-bottom: 8px;
  }
  .result-name {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.15;
    margin: 0 0 4px;
  }
  .result-party {
    display: inline-block;
    font-size: 13px;
    padding: 3px 10px;
    border-radius: 12px;
    background: #1a1a1a !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .result-liner {
    font-size: 15px;
    color: #444 !important;
    -webkit-text-fill-color: #444;
    margin: 6px 0 0;
  }
  .result-pct {
    font-size: 42px;
    font-weight: 700;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    margin: 12px 0 2px;
    line-height: 1;
  }
  .result-pct-label {
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .race-section {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid #eee;
  }
  .race-section:last-of-type { border-bottom: none; }
  .race-header {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    margin-bottom: 10px;
  }

  .section-title {
    font-size: 20px;
    font-weight: 700;
    padding-bottom: 8px;
    border-bottom: 2px solid #111;
    margin-bottom: 16px;
  }

  .reason {
    padding: 14px 0;
    border-bottom: 1px solid #eee;
  }
  .reason:last-child { border-bottom: none; }
  .reason-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .reason-text {
    font-size: 15px;
    line-height: 1.5;
    color: #222 !important;
    -webkit-text-fill-color: #222;
  }
  .reason-text strong { font-weight: 600; color: #111 !important; -webkit-text-fill-color: #111; }
  .reason-text em { color: #666 !important; -webkit-text-fill-color: #666; font-style: italic; }

  .alignment-block {
    margin-top: 8px;
    padding: 14px 16px;
    background: #f7f7f5 !important;
    border-left: 3px solid #d1d1cc;
  }
  .alignment-block.positive { border-left-color: #2b8a3e; background: #f1f8f2 !important; }
  .alignment-block.negative { border-left-color: #c8321a; background: #fdf4f2 !important; }
  .alignment-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: #555 !important;
    -webkit-text-fill-color: #555;
  }
  .alignment-block.positive .alignment-header { color: #2b8a3e !important; -webkit-text-fill-color: #2b8a3e; }
  .alignment-block.negative .alignment-header { color: #c8321a !important; -webkit-text-fill-color: #c8321a; }
  .alignment-icon {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    text-align: center;
    line-height: 16px;
    font-size: 11px;
    background: currentColor;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
  }
  .alignment-item {
    font-size: 14px;
    line-height: 1.5;
    color: #222 !important;
    -webkit-text-fill-color: #222;
    padding: 4px 0;
  }
  .alignment-item strong { font-weight: 600; }
  .vs-box {
    margin-top: 8px;
    padding: 14px 16px;
    background: #f4f0e8 !important;
    border-left: 3px solid #c8321a;
  }
  .vs-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    margin-bottom: 8px;
  }
  .vs-body {
    font-size: 14px;
    line-height: 1.5;
    color: #222 !important;
    -webkit-text-fill-color: #222;
  }
  .vs-body strong { font-weight: 600; color: #111 !important; -webkit-text-fill-color: #111; }

  .caveat {
    background: #fef5f2 !important;
    border-left: 4px solid #c8321a;
    border-radius: 4px;
    padding: 16px 18px;
    margin-top: 16px;
  }
  .caveat-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    margin-bottom: 6px;
  }
  .caveat-body { font-size: 14px; color: #333 !important; -webkit-text-fill-color: #333; line-height: 1.5; }

  /* ==================== SCOREBOARD ==================== */
  .scores-toggle {
    background: transparent;
    border: 1px solid #ddd;
    color: #444 !important;
    -webkit-text-fill-color: #444;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    margin: 16px 0;
    transition: background 0.15s;
  }
  .scores-toggle:hover { background: #f5f5f5 !important; }
  .scores-list {
    display: none;
    background: #fafafa !important;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .scores-list.open { display: block; }
  .score-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid #eee;
  }
  .score-row:last-child { border-bottom: none; }
  .score-name { color: #222 !important; -webkit-text-fill-color: #222; }
  .score-name .p { color: #888 !important; -webkit-text-fill-color: #888; font-size: 12px; margin-left: 4px; }
  .score-val { color: #111 !important; -webkit-text-fill-color: #111; font-weight: 600; }

  /* ==================== BRIEFING CTA ==================== */
  .briefing-cta {
    margin: 24px 0 16px;
    padding: 20px 22px;
    background: #f7f6f3 !important;
    border: 1px solid #1a1a1a;
    text-align: center;
  }
  .briefing-cta-btn {
    display: inline-block;
    background: #1a1a1a !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 28px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    transition: background-color 0.15s;
  }
  .briefing-cta-btn:hover, .briefing-cta-btn:active { background: #c8441c !important; }
  .briefing-cta-hint {
    margin-top: 12px;
    font-size: 13px;
    font-style: italic;
    color: #6a6a67 !important;
    -webkit-text-fill-color: #6a6a67;
  }
  .briefing-link-intro {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    font-family: inherit;
    font-size: 14px;
    text-decoration: underline;
    cursor: pointer;
    padding: 8px 0;
    margin-top: 8px;
  }
  .briefing-link-intro:hover { color: #a0260f !important; -webkit-text-fill-color: #a0260f; }

  .restart-wrap { text-align: center; margin: 20px 0 12px; }
  .restart-btn {
    background: transparent;
    border: 1.5px solid #111;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
  }
  .restart-btn:hover { background: #111 !important; color: #fff !important; -webkit-text-fill-color: #fff; }

  .footer {
    text-align: center;
    font-size: 12px;
    color: #888 !important;
    -webkit-text-fill-color: #888;
    padding: 24px 12px 0;
    font-style: italic;
  }

  /* ==================== BRIEFING OVERLAY ==================== */
  .briefing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #ffffff !important;
    z-index: 1000;
    display: none;
    overflow-y: auto;
  }
  .briefing-overlay.open { display: block; }
  .briefing-top {
    position: sticky;
    top: 0;
    background: #ffffff !important;
    border-bottom: 1px solid #ddd;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .briefing-top-title {
    font-size: 15px;
    font-weight: 600;
    color: #111 !important;
    -webkit-text-fill-color: #111;
  }
  .briefing-close {
    background: #111 !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
    border: none;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  .briefing-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .briefing-content h1 {
    font-size: 26px;
    font-weight: 700;
    margin-top: 32px;
    margin-bottom: 12px;
    color: #111 !important;
    -webkit-text-fill-color: #111;
  }
  .briefing-content h2 {
    font-size: 20px;
    font-weight: 700;
    margin-top: 28px;
    margin-bottom: 10px;
    color: #b8321a !important;
    -webkit-text-fill-color: #b8321a;
  }
  .briefing-content h3 {
    font-size: 16px;
    font-weight: 700;
    margin-top: 20px;
    margin-bottom: 8px;
    color: #111 !important;
    -webkit-text-fill-color: #111;
  }
  .briefing-content p {
    font-size: 15px;
    line-height: 1.6;
    color: #222 !important;
    -webkit-text-fill-color: #222;
    margin: 0 0 12px;
  }
  .briefing-card {

function render() {
  if (state.step === -1) { renderIntro(); return; }
  if (state.step === 'party') { renderPartyGate(); return; }
  if (state.step === 'district') { renderDistrictPicker(); return; }
  if (state.step === 'result') { renderResult(); return; }

  // step is a number — index into the merged question list
  renderQuestion();
}

function setDistrict() {
  const sel = document.getElementById('districtSelect');
  if (!sel || !sel.value) return;
  state.district = parseInt(sel.value, 10);

  // CHECK: does this district have any candidates matching the voter's party?
  // If not, force the cross-party view on — otherwise the matcher has nothing to score.
  const district = HOUSE[state.district];
  if (district.competitive && state.party !== 'U' && !state.showBoth) {
    const candidates = Object.values(district.candidates);
    const hasOwnParty = candidates.some(c => c.party === state.party);
    if (!hasOwnParty) {
      state.showBoth = true;
      state.forcedCrossParty = true; // flag for UI explanation
    }
  }

  // If the district is non-competitive in a house-only flow, jump to info result
  if (state.flow === 'house' && !HOUSE[state.district].competitive) {
    state.step = 'result';
  } else {
    state.step = 0;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

// ==========================================================
// QUESTION SEQUENCING
// ==========================================================
function getActiveQuestions() {
  // Returns the merged list of questions for the current flow
  const qs = [];
  if (state.flow === 'senate' || state.flow === 'both') {
    qs.push(...SENATE_QUESTIONS);
  }
  if ((state.flow === 'house' || state.flow === 'both') && state.district) {
    const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district];
    if (houseQs) qs.push(...houseQs);
  }
  return qs;
}

function renderQuestion() {
  const qs = getActiveQuestions();
  if (state.step >= qs.length) {
    state.step = 'result';
    render();
    return;
  }

  const q = qs[state.step];
  const pct = Math.round(((state.step + 1) / qs.length) * 100);

  let optsHtml, navHtml, helperHtml = '';

  if (q.multi) {
    const selected = state.answers[q.id] || [];
    const maxPicks = q.maxPicks || 3;
    optsHtml = q.options.map(opt => {
      const idx = selected.indexOf(opt.key);
      const isSel = idx !== -1;
      const rank = isSel ? `<span class="rank-badge">${idx + 1}</span>` : '';
      const cls = isSel ? 'selected' : '';
      const sub = opt.sub ? `<small>${opt.sub}</small>` : '';
      return `<button class="opt ${cls}" onclick="toggleMulti('${q.id}', '${opt.key}', ${maxPicks})"><strong>${rank}${opt.label}</strong>${sub}</button>`;
    }).join('');

    const pickedCount = selected.length;
    const remainingText = pickedCount === 0
      ? `Tap up to <strong>${maxPicks}</strong> issues in order of importance`
      : pickedCount < maxPicks
        ? `<strong>${pickedCount} of ${maxPicks} picked.</strong> Tap another, or Continue`
        : `<strong>${maxPicks} picked.</strong> Tap Continue, or swap a pick`;
    helperHtml = `<p class="multi-helper">${remainingText}</p>`;

    navHtml = `
      <button class="continue-btn" onclick="continueMulti()" ${pickedCount === 0 ? 'disabled' : ''}>
        ${pickedCount === 0 ? 'Pick at least one to continue' : 'Continue →'}
      </button>
      <div class="nav">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <span class="nav-hint">${pickedCount > 0 ? `${pickedCount} selected` : ''}</span>
      </div>
    `;
  } else {
    const selected = state.answers[q.id];
    optsHtml = q.options.map(opt => {
      const sel = selected === opt.key ? 'selected' : '';
      const sub = opt.sub ? `<small>${opt.sub}</small>` : '';
      return `<button class="opt ${sel}" onclick="answer('${q.id}', '${opt.key}')"><strong>${opt.label}</strong>${sub}</button>`;
    }).join('');

    navHtml = `
      <div class="nav">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <span class="nav-hint">Tap an answer to continue</span>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="fade-in">
      <div class="progress-row">
        <span class="progress-text">Question ${state.step + 1} of ${qs.length}</span>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
      <h2 class="q-title">${q.title}</h2>
      ${q.sub ? `<p class="q-sub">${q.sub}</p>` : ''}
      ${helperHtml}
      <div class="options">${optsHtml}</div>
      ${navHtml}
    </div>
  `;
}

function toggleMulti(qid, optKey, maxPicks) {
  if (!state.answers[qid]) state.answers[qid] = [];
  const arr = state.answers[qid];
  const idx = arr.indexOf(optKey);
  if (idx !== -1) {
    arr.splice(idx, 1);
  } else {
    if (arr.length >= maxPicks) arr.pop();
    arr.push(optKey);
  }
  render();
}

function continueMulti() {
  const qs = getActiveQuestions();
  const q = qs[state.step];
  const arr = state.answers[q.id] || [];
  if (arr.length === 0) return;
  state.step++;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function answer(qid, key) {
  state.answers[qid] = key;
  render();
  setTimeout(() => {
    state.step++;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }, 180);
}

function goBack() {
  if (state.step === 'party') {
    state.step = -1;
  } else if (state.step === 'district') {
    state.step = 'party';
  } else if (state.step === 0) {
    if (state.flow === 'senate') state.step = 'party';
    else state.step = 'district';
  } else if (typeof state.step === 'number' && state.step > 0) {
    state.step--;
  } else if (state.step === 'result') {
    const qs = getActiveQuestions();
    state.step = qs.length - 1;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function restart() {
  state.step = -1;
  state.answers = {};
  state.flow = null;
  state.party = null;
  state.showBoth = false;
  state.district = null;
  state.forcedCrossParty = false;
  state.showScores = { senate: false, house: false };
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

// ==========================================================
// SCORING
// ==========================================================
function getEligibleSenateCandidates() {
  // Filter by party unless showBoth
  const keys = Object.keys(SENATE);
  if (state.showBoth || state.party === 'U') return keys;
  return keys.filter(k => SENATE[k].party === state.party);
}

function getEligibleHouseCandidates() {
  if (!state.district) return [];
  const district = HOUSE[state.district];
  if (!district || !district.competitive) return [];
  const keys = Object.keys(district.candidates);
  if (state.showBoth || state.party === 'U') return keys;
  // All KY-4 and KY-6 competitive candidates are R, so filtering by party is essentially a no-op except for D voters
  return keys.filter(k => district.candidates[k].party === state.party);
}

function computeSenateScores() {
  const eligible = getEligibleSenateCandidates();
  const scores = {};
  eligible.forEach(k => scores[k] = 0);

  SENATE_QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    if (!ans) return;

    if (q.multi && Array.isArray(ans)) {
      ans.forEach((key, idx) => {
        const opt = q.options.find(o => o.key === key);
        if (!opt || !opt.weights) return;
        const mult = RANK_MULTIPLIERS[idx] || 0;
        eligible.forEach(c => {
          scores[c] = (scores[c] || 0) + ((opt.weights[c] || 0) * mult);
        });
      });
    } else if (typeof ans === 'string') {
      const opt = q.options.find(o => o.key === ans);
      if (!opt) return;
      if (opt.weights) eligible.forEach(c => { scores[c] = (scores[c] || 0) + (opt.weights[c] || 0); });
      if (opt.eliminates && opt.eliminates.length) {
        opt.eliminates.forEach(c => { if (scores[c] !== undefined) scores[c] = Math.round((scores[c] || 0) * 0.3); });
      }
    }
  });

  Object.keys(scores).forEach(k => scores[k] = Math.round(scores[k]));
  return scores;
}

function computeHouseScores() {
  const eligible = getEligibleHouseCandidates();
  if (eligible.length === 0) return {};
  const scores = {};
  eligible.forEach(k => scores[k] = 0);

  const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district] || [];
  houseQs.forEach(q => {
    const ans = state.answers[q.id];
    if (!ans || typeof ans !== 'string') return;
    const opt = q.options.find(o => o.key === ans);
    if (!opt || !opt.weights) return;
    eligible.forEach(c => {
      if (opt.weights[c] !== undefined) scores[c] = (scores[c] || 0) + opt.weights[c];
    });
  });
  return scores;
}

function computeSenateMax() {
  const eligible = getEligibleSenateCandidates();
  let max = 0;
  SENATE_QUESTIONS.forEach(q => {
    if (q.multi) {
      const allMaxes = q.options
        .filter(o => o.weights)
        .map(o => Math.max(...eligible.map(c => o.weights[c] || 0)));
      allMaxes.sort((a, b) => b - a);
      for (let i = 0; i < Math.min(q.maxPicks || 3, allMaxes.length); i++) {
        max += (allMaxes[i] || 0) * (RANK_MULTIPLIERS[i] || 0);
      }
    } else {
      let qMax = 0;
      q.options.forEach(opt => {
        if (opt.weights) {
          const localMax = Math.max(...eligible.map(c => opt.weights[c] || 0));
          if (localMax > qMax) qMax = localMax;
        }
      });
      max += qMax;
    }
  });
  return Math.round(max);
}

function computeHouseMax() {
  const eligible = getEligibleHouseCandidates();
  if (eligible.length === 0) return 0;
  const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district] || [];
  let max = 0;
  houseQs.forEach(q => {
    let qMax = 0;
    q.options.forEach(opt => {
      if (opt.weights) {
        const localMax = Math.max(...eligible.map(c => opt.weights[c] || 0));
        if (localMax > qMax) qMax = localMax;
      }
    });
    max += qMax;
  });
  return max;
}

// REASONING
// ==========================================================
function buildSenateReasons(winnerKey) {
  const reasons = [];
  const scores = computeSenateScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (sorted.length < 2) return reasons;
  const runnerKey = sorted[1][0];
  const winnerFirst = SENATE[winnerKey].name.split(' ')[0];

  // Top issues
  const topIssues = state.answers.topIssue;
  if (topIssues && Array.isArray(topIssues) && topIssues.length > 0) {
    const rankLabels = ['Your #1 issue', 'Your #2 issue', 'Your #3 issue'];
    topIssues.forEach((key, idx) => {
      const opt = SENATE_QUESTIONS[0].options.find(o => o.key === key);
      if (!opt) return;
      const stance = SENATE_STANCES[winnerKey]?.topIssue?.[key];
      const label = ANSWER_LABELS.topIssue[key] || key;
      let body;
      if (stance) {
        body = `You picked <strong>${label}</strong>. ${winnerFirst}: ${stance}`;
      } else {
        body = `You picked <strong>${label}</strong>. ${opt.reason || ''}`;
      }
      const weight = opt.weights?.[winnerKey] || 0;
      if (weight <= 1) {
        const topScorer = Object.entries(opt.weights || {}).sort((a, b) => b[1] - a[1])[0];
        if (topScorer && topScorer[0] !== winnerKey && SENATE[topScorer[0]]) {
          body += ` <em>Note: ${SENATE[topScorer[0]].name.split(' ')[0]} has the strongest record on this specific issue.</em>`;
        }
      }
      reasons.push({ q: rankLabels[idx], body });
    });
  }

  // About
  reasons.push({ q: `About ${winnerFirst}`, body: SENATE[winnerKey].oneLiner });

  // Alignments
  const aligned = [];
  const misaligned = [];
  SENATE_QUESTIONS.forEach(q => {
    if (q.id === 'redflag' || q.id === 'topIssue') return;
    const ansKey = state.answers[q.id];
    if (!ansKey || typeof ansKey !== 'string') return;
    const opt = q.options.find(o => o.key === ansKey);
    if (!opt || !opt.weights) return;
    const pts = opt.weights[winnerKey] || 0;
    const answerLabel = ANSWER_LABELS[q.id]?.[ansKey] || ansKey;
    const stance = SENATE_STANCES[winnerKey]?.[q.id]?.[ansKey];
    if (pts >= 3) aligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
    else if (pts <= 1) misaligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
  });

  if (aligned.length > 0) {
    const items = aligned.map(a => {
      const stanceText = a.stance ? ` — ${a.stance}` : '';
      return `<div class="alignment-item"><strong>${a.qLabel}:</strong> you chose <strong>${a.answerLabel}</strong>${stanceText}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block positive">
        <div class="alignment-header"><span class="alignment-icon">✓</span> Where else ${winnerFirst} matches you</div>
        ${items}
      </div>`
    });
  }

  if (misaligned.length > 0) {
    const items = misaligned.map(m => {
      let note;
      if (m.stance) {
        note = ` — ${m.stance}`;
      } else {
        const q = SENATE_QUESTIONS.find(qq => QUESTION_LABELS[qq.id] === m.qLabel);
        if (q) {
          const ansKey = state.answers[q.id];
          const opt = q.options.find(o => o.key === ansKey);
          if (opt?.weights) {
            const eligible = getEligibleSenateCandidates();
            const topScorer = Object.entries(opt.weights).filter(([k]) => eligible.includes(k)).sort((a, b) => b[1] - a[1])[0];
            if (topScorer && topScorer[0] !== winnerKey) {
              note = ` — ${SENATE[topScorer[0]].name.split(' ')[0]} would have scored higher on this dimension.`;
            } else note = `.`;
          } else note = `.`;
        } else note = `.`;
      }
      return `<div class="alignment-item"><strong>${m.qLabel}:</strong> you chose <strong>${m.answerLabel}</strong>${note}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block negative">
        <div class="alignment-header"><span class="alignment-icon">!</span> Where you and ${winnerFirst} don't fully line up</div>
        ${items}
        <div class="alignment-item" style="margin-top: 8px; font-style: italic; color: #666;">${winnerFirst} still scored highest overall — your other priorities outweighed these gaps.</div>
      </div>`
    });
  }

  // Head-to-head
  const winnerScore = sorted[0][1];
  const runnerScore = sorted[1][1];
  const runnerName = SENATE[runnerKey].name.split(' ')[0];
  const vsDetail = buildSenateHeadToHead(winnerKey, runnerKey);
  reasons.push({
    q: null,
    html: `<div class="vs-box">
      <div class="vs-header">Why ${winnerFirst}, not ${runnerName}?</div>
      <div class="vs-body">Your answers pointed more often to ${winnerFirst}. ${vsDetail}</div>
    </div>`
  });

  return reasons;
}

function buildSenateHeadToHead(winnerKey, runnerKey) {
  const diffs = [];
  SENATE_QUESTIONS.forEach(q => {
    if (q.id === 'redflag') return;
    const ans = state.answers[q.id];
    if (!ans) return;
    if (q.multi && Array.isArray(ans)) {
      let wt = 0, rt = 0;
      ans.forEach((key, idx) => {
        const opt = q.options.find(o => o.key === key);
        if (!opt?.weights) return;
        const mult = RANK_MULTIPLIERS[idx] || 0;
        wt += (opt.weights[winnerKey] || 0) * mult;
        rt += (opt.weights[runnerKey] || 0) * mult;
      });
      const diff = Math.round(wt - rt);
      if (Math.abs(diff) >= 1) {
        const topKey = ans[0];
        diffs.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel: ANSWER_LABELS[q.id]?.[topKey] || topKey, diff });
      }
    } else if (typeof ans === 'string') {
      const opt = q.options.find(o => o.key === ans);
      if (!opt?.weights) return;
      const diff = (opt.weights[winnerKey] || 0) - (opt.weights[runnerKey] || 0);
      if (Math.abs(diff) >= 1) diffs.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel: ANSWER_LABELS[q.id]?.[ans] || ans, diff });
    }
  });
  return buildVsNarrative(diffs, SENATE[winnerKey].name.split(' ')[0], SENATE[runnerKey].name.split(' ')[0]);
}

function buildHouseReasons(winnerKey) {
  const reasons = [];
  const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district] || [];
  const district = HOUSE[state.district];
  if (!district) return reasons;
  const winnerObj = district.candidates[winnerKey];
  const winnerFirst = winnerObj.name.split(' ')[0];

  // About
  reasons.push({ q: `About ${winnerFirst}`, body: winnerObj.oneLiner });

  // Alignment walk
  const aligned = [];
  const misaligned = [];
  houseQs.forEach(q => {
    const ansKey = state.answers[q.id];
    if (!ansKey || typeof ansKey !== 'string') return;
    const opt = q.options.find(o => o.key === ansKey);
    if (!opt?.weights) return;
    const pts = opt.weights[winnerKey] || 0;
    const answerLabel = ANSWER_LABELS[q.id]?.[ansKey] || ansKey;
    const stance = HOUSE_STANCES[winnerKey]?.[q.id]?.[ansKey];
    if (pts >= 3) aligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
    else if (pts <= 1) misaligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
  });

  if (aligned.length > 0) {
    const items = aligned.map(a => {
      const stanceText = a.stance ? ` — ${a.stance}` : '';
      return `<div class="alignment-item"><strong>${a.qLabel}:</strong> you chose <strong>${a.answerLabel}</strong>${stanceText}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block positive">
        <div class="alignment-header"><span class="alignment-icon">✓</span> Where ${winnerFirst} matches you</div>
        ${items}
      </div>`
    });
  }

  if (misaligned.length > 0) {
    const items = misaligned.map(m => {
      let note;
      if (m.stance) note = ` — ${m.stance}`;
      else note = `.`;
      return `<div class="alignment-item"><strong>${m.qLabel}:</strong> you chose <strong>${m.answerLabel}</strong>${note}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block negative">
        <div class="alignment-header"><span class="alignment-icon">!</span> Where you and ${winnerFirst} don't fully line up</div>
        ${items}
      </div>`
    });
  }

  // Head-to-head
  const scores = computeHouseScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (sorted.length >= 2) {
    const runnerKey = sorted[1][0];
    const runnerFirst = district.candidates[runnerKey].name.split(' ')[0];
    const diffs = [];
    houseQs.forEach(q => {
      const ans = state.answers[q.id];
      if (!ans || typeof ans !== 'string') return;
      const opt = q.options.find(o => o.key === ans);
      if (!opt?.weights) return;
      const diff = (opt.weights[winnerKey] || 0) - (opt.weights[runnerKey] || 0);
      if (Math.abs(diff) >= 1) diffs.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel: ANSWER_LABELS[q.id]?.[ans] || ans, diff });
    });
    const vsDetail = buildVsNarrative(diffs, winnerFirst, runnerFirst);
    reasons.push({
      q: null,
      html: `<div class="vs-box">
        <div class="vs-header">Why ${winnerFirst}, not ${runnerFirst}?</div>
        <div class="vs-body">Your answers pointed more often to ${winnerFirst}. ${vsDetail}</div>
      </div>`
    });
  }

  return reasons;
}

function buildVsNarrative(diffs, winnerFirst, runnerFirst) {
  const winnerAdv = diffs.filter(d => d.diff > 0).sort((a, b) => b.diff - a.diff);
  const runnerAdv = diffs.filter(d => d.diff < 0).sort((a, b) => a.diff - b.diff);
  if (winnerAdv.length === 0) {
    return `Your answers were split almost evenly. The win comes from small accumulated edges rather than one big difference.`;
  }
  const top = winnerAdv[0];
  let text = `The biggest edge was on <strong>${top.qLabel.toLowerCase()}</strong> — ${winnerFirst} lined up more closely with your answer than ${runnerFirst}.`;
  const more = winnerAdv.slice(1, 3);
  if (more.length > 0) text += ` ${winnerFirst} also edged ahead on ${more.map(d => d.qLabel.toLowerCase()).join(' and ')}.`;
  const sigRunner = runnerAdv.filter(d => Math.abs(d.diff) >= 2);
  if (sigRunner.length > 0) text += ` ${runnerFirst} did score higher on <strong>${sigRunner[0].qLabel.toLowerCase()}</strong>, but not by enough to close the overall gap.`;
  return text;
}

            const c = district.candidates[k];
            return `<div class="score-row"><span class="score-name">${c.name}<span class="p">(${c.party})</span></span><span class="score-val">${s}</span></div>`;
