<!DOCTYPE html>
<html lang="en" style="color-scheme: light only;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="theme-color" content="#ffffff">
<title>Kentucky 2026 Election Matcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light only; }
  html, body { background: #ffffff !important; color: #111 !important; -webkit-text-fill-color: #111; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    background: #ffffff !important;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    background: #ffffff !important;
  }

  /* ==================== TYPOGRAPHY ==================== */
  h1, h2, h3 { color: #111 !important; -webkit-text-fill-color: #111; margin: 0; }
  p { color: #222 !important; -webkit-text-fill-color: #222; }

  .brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #b8321a !important;
    -webkit-text-fill-color: #b8321a;
    margin-bottom: 12px;
  }
  .hero-title {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }
  .hero-sub {
    font-size: 16px;
    color: #555 !important;
    -webkit-text-fill-color: #555;
    margin-bottom: 24px;
  }

  /* ==================== STATS GRID ==================== */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
    padding: 18px;
    background: #f7f6f3 !important;
    border-radius: 10px;
  }
  .stat-item { text-align: center; }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    display: block;
  }
  .stat-label {
    font-size: 11px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 3px;
  }

  /* ==================== HOW IT WORKS ==================== */
  .how-list { margin: 0 0 24px 0; padding: 0; list-style: none; counter-reset: step; }
  .how-list li {
    counter-increment: step;
    padding-left: 36px;
    position: relative;
    margin-bottom: 12px;
    font-size: 15px;
    color: #222 !important;
    -webkit-text-fill-color: #222;
  }
  .how-list li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    top: 0;
    width: 24px;
    height: 24px;
    background: #1a1a1a !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  /* ==================== PRIMARY BUTTON ==================== */
  .primary-btn {
    display: block;
    width: 100%;
    padding: 16px 24px;
    background: #c8441c !important;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    transition: background-color 0.15s;
  }
  .primary-btn:hover, .primary-btn:active { background: #a0361a !important; }
  .primary-btn:disabled { background: #bbb !important; cursor: not-allowed; }

  .secondary-btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: #ffffff !important;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    border: 1.5px solid #111;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background-color 0.15s;
  }
  .secondary-btn:hover, .secondary-btn:active { background: #f5f5f5 !important; }

  /* ==================== DISCLAIMER ==================== */
  .disclaimer {
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    font-style: italic;
    text-align: center;
    margin-top: 24px;
    padding: 0 20px;
  }

  /* ==================== QUESTION SCREEN ==================== */
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 12px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .progress-text { font-weight: 600; }
  .progress-bar {
    flex: 1;
    margin-left: 16px;
    height: 4px;
    background: #eee !important;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #c8441c !important;
    transition: width 0.3s ease;
  }

  .q-title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .q-sub {
    font-size: 15px;
    color: #555 !important;
    -webkit-text-fill-color: #555;
    margin-bottom: 18px;
  }
  .multi-helper {
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    font-style: italic;
    margin-bottom: 14px;
  }
  .multi-helper strong { color: #c8321a !important; -webkit-text-fill-color: #c8321a; font-weight: 700; font-style: normal; }

  /* ==================== OPTIONS ==================== */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .opt {
    background: #fff !important;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.4;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    width: 100%;
    transition: border-color 0.15s, background 0.15s;
  }
  .opt:hover { border-color: #111; }
  .opt.selected {
    border-color: #c8321a;
    background: #fef5f2 !important;
  }
  .opt strong {
    display: block;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 2px;
    color: #111 !important;
    -webkit-text-fill-color: #111;
  }
  .opt small {
    display: block;
    font-size: 13px;
    color: #666 !important;
    -webkit-text-fill-color: #666;
  }
  .rank-badge {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    background: #c8321a !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    margin-right: 8px;
    vertical-align: middle;
  }

  .continue-btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: #c8321a !important;
    color: #fff !important;
    -webkit-text-fill-color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    margin-bottom: 12px;
    transition: background-color 0.15s;
  }
  .continue-btn:hover, .continue-btn:active { background: #a0260f !important; }
  .continue-btn:disabled { background: #ccc !important; cursor: not-allowed; }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }
  .back-btn {
    background: transparent;
    border: none;
    color: #666 !important;
    -webkit-text-fill-color: #666;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 8px 12px;
  }
  .back-btn:hover:not(:disabled) { color: #111 !important; -webkit-text-fill-color: #111; }
  .back-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-hint { font-size: 13px; color: #888 !important; -webkit-text-fill-color: #888; }

  /* ==================== DISTRICT PICKER ==================== */
  select.district-picker {
    width: 100%;
    padding: 14px 16px;
    font-family: inherit;
    font-size: 15px;
    color: #111 !important;
    -webkit-text-fill-color: #111;
    background: #fff !important;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    margin-bottom: 12px;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23111' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 16px center;
    background-size: 20px;
  }
  .district-picker:focus { outline: none; border-color: #c8321a; }
  .district-lookup {
    display: inline-block;
    margin-bottom: 16px;
    font-size: 14px;
    color: #c8321a !important;
    -webkit-text-fill-color: #c8321a;
    text-decoration: underline;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
  }

  /* ==================== DATA FRESHNESS BANNER ==================== */
  .data-banner {
    padding: 10px 14px;
    background: #fef5f2 !important;
    border-left: 3px solid #c8321a;
    border-radius: 4px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.5;
    color: #4a2a20 !important;
    -webkit-text-fill-color: #4a2a20;
  }
  .data-banner strong {
    color: #8a2010 !important;
    -webkit-text-fill-color: #8a2010;
    font-weight: 700;
  }

  /* ==================== ECONOMIC CONTEXT CALLOUT ==================== */
  .econ-callout {
    background: #faf7f0 !important;
    border: 1px solid #2a251e;
    padding: 20px;
    margin: 20px 0;
  }
  .econ-callout-kicker {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    margin-bottom: 6px;
  }
  .econ-callout-title {
    font-size: 18px;
    font-weight: 700;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
    margin-bottom: 10px;
    line-height: 1.25;
  }
  .econ-callout-lead {
    font-size: 14px;
    color: #3a352e !important;
    -webkit-text-fill-color: #3a352e;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .econ-tables-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 6px;
  }
  .econ-table-wrap {
    background: #f0ebdc !important;
    border: 1px solid #2a251e;
    display: flex;
    flex-direction: column;
  }
  .econ-table-label {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .econ-table-scroll {
    max-height: 280px;
    overflow-y: auto;
    background: #faf7f0 !important;
  }
  .econ-table-scroll::-webkit-scrollbar { width: 8px; }
  .econ-table-scroll::-webkit-scrollbar-track { background: #f0ebdc; }
  .econ-table-scroll::-webkit-scrollbar-thumb { background: #2a251e; border-radius: 0; }
  .econ-mini-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
  }
  .econ-mini-table thead {
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .econ-mini-table th {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 6px 6px;
    text-align: left;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .econ-mini-table th:nth-child(1) { width: 30%; }
  .econ-mini-table th:nth-child(2) { width: 22%; }
  .econ-mini-table th:nth-child(3) { width: 28%; }
  .econ-mini-table th:nth-child(4) { width: 20%; }
  .econ-mini-table td {
    padding: 6px 6px;
    border-bottom: 1px solid rgba(42,37,30,0.12);
    vertical-align: top;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    font-size: 12px;
    line-height: 1.35;
    word-wrap: normal;
    overflow-wrap: normal;
    word-break: normal;
  }
  .econ-mini-table td:first-child {
    font-weight: 600;
    background: rgba(42,37,30,0.04) !important;
  }
  .econ-mini-table td:nth-child(2), .econ-mini-table td:nth-child(3) {
    color: #5a544a !important;
    -webkit-text-fill-color: #5a544a;
  }
  .econ-tag {
    font-size: 9px !important;
    padding: 2px 4px !important;
    letter-spacing: 0.02em !important;
  }
  .econ-mini-table td:nth-child(2),
  .econ-mini-table td:nth-child(3) {
    word-break: normal;
    overflow-wrap: normal;
    word-wrap: normal;
  }
  .econ-table-foot {
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.45;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    background: #e5e1d6 !important;
    border-top: 1px solid #2a251e;
  }
  .econ-table-foot strong { color: #1a1814 !important; -webkit-text-fill-color: #1a1814; }

  /* ==================== ECONOMIC OVERLAY ==================== */
  .econ-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #faf7f0 !important;
    z-index: 1000;
    display: none;
    overflow-y: auto;
  }
  .econ-overlay.open { display: block; }
  .econ-top {
    position: sticky;
    top: 0;
    background: #faf7f0 !important;
    border-bottom: 1px solid #2a251e;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .econ-top-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
  }
  .econ-close {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    border: none;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
  }
  .econ-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  .econ-content h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
    line-height: 1.15;
  }
  .econ-content h2 {
    font-size: 20px;
    font-weight: 700;
    margin-top: 36px;
    margin-bottom: 12px;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    padding-bottom: 6px;
    border-bottom: 2px solid #8b2e1f;
  }
  .econ-content h3 {
    font-size: 16px;
    font-weight: 700;
    margin-top: 24px;
    margin-bottom: 10px;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
  }
  .econ-content .section-kicker {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    margin-top: 36px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .econ-content p {
    font-size: 15px;
    line-height: 1.6;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    margin-bottom: 14px;
  }
  .econ-content p.lead {
    font-size: 17px;
    font-weight: 400;
    color: #1a1814 !important;
    -webkit-text-fill-color: #1a1814;
  }
  .econ-content ul {
    padding-left: 20px;
    margin-bottom: 16px;
  }
  .econ-content ul li {
    font-size: 15px;
    line-height: 1.6;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
    margin-bottom: 6px;
  }
  .econ-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 16px 0;
    border: 1px solid #2a251e;
    background: #f0ebdc !important;
  }
  .econ-table th {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 10px 8px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .econ-table th small {
    display: block;
    font-size: 9px;
    opacity: 0.75;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
    margin-top: 2px;
  }
  .econ-table td {
    padding: 9px 8px;
    border-bottom: 1px solid rgba(42,37,30,0.12);
    vertical-align: top;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
  }
  .econ-table td:first-child {
    font-weight: 600;
    background: rgba(42,37,30,0.04) !important;
    font-size: 13px;
  }
  .econ-tag {
    display: inline-block;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .econ-tag-worse { background: #f4d9d3 !important; color: #8b2e1f !important; -webkit-text-fill-color: #8b2e1f; }
  .econ-tag-better { background: #d4e8d9 !important; color: #2d5a3d !important; -webkit-text-fill-color: #2d5a3d; }
  .econ-tag-neutral { background: #e5e1d6 !important; color: #5a544a !important; -webkit-text-fill-color: #5a544a; }
  .econ-callout-box {
    background: #f0ebdc !important;
    border-left: 3px solid #8b2e1f;
    padding: 12px 14px;
    margin: 12px 0;
    font-size: 14px;
    line-height: 1.55;
  }
  .econ-callout-box-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    display: block;
    margin-bottom: 4px;
  }
  .econ-scorecard {
    background: #1a1814 !important;
    color: #faf7f0 !important;
    -webkit-text-fill-color: #faf7f0;
    padding: 14px 16px;
    font-size: 14px;
    margin: 12px 0 20px;
  }
  .econ-scorecard strong { color: #faf7f0 !important; -webkit-text-fill-color: #faf7f0; }
  .econ-glossary-item {
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(42,37,30,0.12);
  }
  .econ-glossary-item:last-child { border-bottom: none; }
  .econ-glossary-term {
    font-size: 14px;
    font-weight: 700;
    color: #8b2e1f !important;
    -webkit-text-fill-color: #8b2e1f;
    display: block;
    margin-bottom: 3px;
  }
  .econ-glossary-def {
    font-size: 13px;
    line-height: 1.5;
    color: #2a251e !important;
    -webkit-text-fill-color: #2a251e;
  }

  /* ==================== INFO BOX ==================== */
  .info-box {
    padding: 12px 14px;
    background: #fff8e1 !important;
    border-left: 3px solid #c8921a;
    border-radius: 4px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.5;
    color: #4a3a1a !important;
    -webkit-text-fill-color: #4a3a1a;
  }
  .info-box strong { color: #2a200a !important; -webkit-text-fill-color: #2a200a; }

  /* ==================== TOGGLE (party show-both) ==================== */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    background: #f7f6f3 !important;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .toggle {
    position: relative;
    display: inline-block;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #ccc !important;
    border-radius: 24px;
    transition: 0.2s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    height: 18px;
    width: 18px;
    left: 3px;
    top: 3px;
    background: #fff !important;
    border-radius: 50%;
    transition: 0.2s;

function setDistrict() {
  const sel = document.getElementById('districtSelect');
  if (!sel || !sel.value) return;
  state.district = parseInt(sel.value, 10);

  // CHECK: does this district have any candidates matching the voter's party?
  // If not, force the cross-party view on — otherwise the matcher has nothing to score.
  const district = HOUSE[state.district];
  if (district.competitive && state.party !== 'U' && !state.showBoth) {
    const candidates = Object.values(district.candidates);
    const hasOwnParty = candidates.some(c => c.party === state.party);
    if (!hasOwnParty) {
      state.showBoth = true;
      state.forcedCrossParty = true; // flag for UI explanation
    }
  }

  // If the district is non-competitive in a house-only flow, jump to info result
  if (state.flow === 'house' && !HOUSE[state.district].competitive) {
    state.step = 'result';
  } else {
    state.step = 0;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

// ==========================================================
// QUESTION SEQUENCING
// ==========================================================
function getActiveQuestions() {
  // Returns the merged list of questions for the current flow
  const qs = [];
  if (state.flow === 'senate' || state.flow === 'both') {
    qs.push(...SENATE_QUESTIONS);
  }
  if ((state.flow === 'house' || state.flow === 'both') && state.district) {
    const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district];
    if (houseQs) qs.push(...houseQs);
  }
  return qs;
}

function renderQuestion() {
  const qs = getActiveQuestions();
  if (state.step >= qs.length) {
    state.step = 'result';
    render();
    return;
  }

  const q = qs[state.step];
  const pct = Math.round(((state.step + 1) / qs.length) * 100);

  let optsHtml, navHtml, helperHtml = '';

  if (q.multi) {
    const selected = state.answers[q.id] || [];
    const maxPicks = q.maxPicks || 3;
    optsHtml = q.options.map(opt => {
      const idx = selected.indexOf(opt.key);
      const isSel = idx !== -1;
      const rank = isSel ? `<span class="rank-badge">${idx + 1}</span>` : '';
      const cls = isSel ? 'selected' : '';
      const sub = opt.sub ? `<small>${opt.sub}</small>` : '';
      return `<button class="opt ${cls}" onclick="toggleMulti('${q.id}', '${opt.key}', ${maxPicks})"><strong>${rank}${opt.label}</strong>${sub}</button>`;
    }).join('');

    const pickedCount = selected.length;
    const remainingText = pickedCount === 0
      ? `Tap up to <strong>${maxPicks}</strong> issues in order of importance`
      : pickedCount < maxPicks
        ? `<strong>${pickedCount} of ${maxPicks} picked.</strong> Tap another, or Continue`
        : `<strong>${maxPicks} picked.</strong> Tap Continue, or swap a pick`;
    helperHtml = `<p class="multi-helper">${remainingText}</p>`;

    navHtml = `
      <button class="continue-btn" onclick="continueMulti()" ${pickedCount === 0 ? 'disabled' : ''}>
        ${pickedCount === 0 ? 'Pick at least one to continue' : 'Continue →'}
      </button>
      <div class="nav">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <span class="nav-hint">${pickedCount > 0 ? `${pickedCount} selected` : ''}</span>
      </div>
    `;
  } else {
    const selected = state.answers[q.id];
    optsHtml = q.options.map(opt => {
      const sel = selected === opt.key ? 'selected' : '';
      const sub = opt.sub ? `<small>${opt.sub}</small>` : '';
      return `<button class="opt ${sel}" onclick="answer('${q.id}', '${opt.key}')"><strong>${opt.label}</strong>${sub}</button>`;
    }).join('');

    navHtml = `
      <div class="nav">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <span class="nav-hint">Tap an answer to continue</span>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="fade-in">
      <div class="progress-row">
        <span class="progress-text">Question ${state.step + 1} of ${qs.length}</span>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
      <h2 class="q-title">${q.title}</h2>
      ${q.sub ? `<p class="q-sub">${q.sub}</p>` : ''}
      ${helperHtml}
      <div class="options">${optsHtml}</div>
      ${navHtml}
    </div>
  `;
}

function toggleMulti(qid, optKey, maxPicks) {
  if (!state.answers[qid]) state.answers[qid] = [];
  const arr = state.answers[qid];
  const idx = arr.indexOf(optKey);
  if (idx !== -1) {
    arr.splice(idx, 1);
  } else {
    if (arr.length >= maxPicks) arr.pop();
    arr.push(optKey);
  }
  render();
}

function continueMulti() {
  const qs = getActiveQuestions();
  const q = qs[state.step];
  const arr = state.answers[q.id] || [];
  if (arr.length === 0) return;
  state.step++;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function answer(qid, key) {
  state.answers[qid] = key;
  render();
  setTimeout(() => {
    state.step++;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }, 180);
}

function goBack() {
  if (state.step === 'party') {
    state.step = -1;
  } else if (state.step === 'district') {
    state.step = 'party';
  } else if (state.step === 0) {
    if (state.flow === 'senate') state.step = 'party';
    else state.step = 'district';
  } else if (typeof state.step === 'number' && state.step > 0) {
    state.step--;
  } else if (state.step === 'result') {
    const qs = getActiveQuestions();
    state.step = qs.length - 1;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function restart() {
  state.step = -1;
  state.answers = {};
  state.flow = null;
  state.party = null;
  state.showBoth = false;
  state.district = null;
  state.forcedCrossParty = false;
  state.showScores = { senate: false, house: false };
  state.showMethod = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

// ==========================================================
// SCORING
// ==========================================================
function getEligibleSenateCandidates() {
  // Filter by party unless showBoth
  const keys = Object.keys(SENATE);
  if (state.showBoth || state.party === 'U') return keys;
  return keys.filter(k => SENATE[k].party === state.party);
}

function getEligibleHouseCandidates() {
  if (!state.district) return [];
  const district = HOUSE[state.district];
  if (!district || !district.competitive) return [];
  const keys = Object.keys(district.candidates);
  if (state.showBoth || state.party === 'U') return keys;
  // All KY-4 and KY-6 competitive candidates are R, so filtering by party is essentially a no-op except for D voters
  return keys.filter(k => district.candidates[k].party === state.party);
}

function computeSenateScores() {
  const eligible = getEligibleSenateCandidates();
  const scores = {};
  eligible.forEach(k => scores[k] = 0);

  SENATE_QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    if (!ans) return;

    if (q.multi && Array.isArray(ans)) {
      ans.forEach((key, idx) => {
        const opt = q.options.find(o => o.key === key);
        if (!opt || !opt.weights) return;
        const mult = RANK_MULTIPLIERS[idx] || 0;
        eligible.forEach(c => {
          scores[c] = (scores[c] || 0) + ((opt.weights[c] || 0) * mult);
        });
      });
    } else if (typeof ans === 'string') {
      const opt = q.options.find(o => o.key === ans);
      if (!opt) return;
      if (opt.weights) eligible.forEach(c => { scores[c] = (scores[c] || 0) + (opt.weights[c] || 0); });
      if (opt.eliminates && opt.eliminates.length) {
        opt.eliminates.forEach(c => { if (scores[c] !== undefined) scores[c] = Math.round((scores[c] || 0) * 0.3); });
      }
    }
  });

  // Note: do NOT round here — fractional scores from rank multipliers (1.0/0.6/0.3)
  // are what prevent false ties. Rounding happens only at display time for percentages.
  return scores;
}

function computeHouseScores() {
  const eligible = getEligibleHouseCandidates();
  if (eligible.length === 0) return {};
  const scores = {};
  eligible.forEach(k => scores[k] = 0);

  const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district] || [];
  houseQs.forEach(q => {
    const ans = state.answers[q.id];
    if (!ans || typeof ans !== 'string') return;
    const opt = q.options.find(o => o.key === ans);
    if (!opt || !opt.weights) return;
    eligible.forEach(c => {
      if (opt.weights[c] !== undefined) scores[c] = (scores[c] || 0) + opt.weights[c];
    });
  });
  return scores;
}

function computeSenateMax() {
  const eligible = getEligibleSenateCandidates();
  let max = 0;
  SENATE_QUESTIONS.forEach(q => {
    if (q.multi) {
      const allMaxes = q.options
        .filter(o => o.weights)
        .map(o => Math.max(...eligible.map(c => o.weights[c] || 0)));
      allMaxes.sort((a, b) => b - a);
      for (let i = 0; i < Math.min(q.maxPicks || 3, allMaxes.length); i++) {
        max += (allMaxes[i] || 0) * (RANK_MULTIPLIERS[i] || 0);
      }
    } else {
      let qMax = 0;
      q.options.forEach(opt => {
        if (opt.weights) {
          const localMax = Math.max(...eligible.map(c => opt.weights[c] || 0));
          if (localMax > qMax) qMax = localMax;
        }
      });
      max += qMax;
    }
  });
  return Math.round(max);
}

function computeHouseMax() {
  const eligible = getEligibleHouseCandidates();
  if (eligible.length === 0) return 0;
  const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district] || [];
  let max = 0;
  houseQs.forEach(q => {
    let qMax = 0;
    q.options.forEach(opt => {
      if (opt.weights) {
        const localMax = Math.max(...eligible.map(c => opt.weights[c] || 0));
        if (localMax > qMax) qMax = localMax;
      }
    });
    max += qMax;
  });
  return max;
}

// Return the last name (or full name if only one word).
// Used in narrative so we say "Massie" not "Thomas" — standard political shorthand.
function lastName(fullName) {
  if (!fullName) return '';
  const parts = fullName.trim().split(/\s+/);
  return parts[parts.length - 1];
}

// REASONING
// ==========================================================
function buildSenateReasons(winnerKey) {
  const reasons = [];
  const scores = computeSenateScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (sorted.length < 2) return reasons;
  const runnerKey = sorted[1][0];
  const winnerFirst = lastName(SENATE[winnerKey].name);

  // Top issues
  const topIssues = state.answers.topIssue;
  if (topIssues && Array.isArray(topIssues) && topIssues.length > 0) {
    const rankLabels = ['Your #1 issue', 'Your #2 issue', 'Your #3 issue'];
    topIssues.forEach((key, idx) => {
      const opt = SENATE_QUESTIONS[0].options.find(o => o.key === key);
      if (!opt) return;
      const stance = SENATE_STANCES[winnerKey]?.topIssue?.[key];
      const label = ANSWER_LABELS.topIssue[key] || key;
      let body;
      if (stance) {
        body = `You picked <strong>${label}</strong>. ${winnerFirst}: ${stance}`;
      } else {
        body = `You picked <strong>${label}</strong>. ${opt.reason || ''}`;
      }
      const weight = opt.weights?.[winnerKey] || 0;
      if (weight <= 1) {
        const topScorer = Object.entries(opt.weights || {}).sort((a, b) => b[1] - a[1])[0];
        if (topScorer && topScorer[0] !== winnerKey && SENATE[topScorer[0]]) {
          body += ` <em>Note: ${lastName(SENATE[topScorer[0]].name)} has the strongest record on this specific issue.</em>`;
        }
      }
      reasons.push({ q: rankLabels[idx], body });
    });
  }

  // About
  reasons.push({ q: `About ${winnerFirst}`, body: SENATE[winnerKey].oneLiner });

  // Alignments
  const aligned = [];
  const misaligned = [];
  SENATE_QUESTIONS.forEach(q => {
    if (q.id === 'redflag' || q.id === 'topIssue') return;
    const ansKey = state.answers[q.id];
    if (!ansKey || typeof ansKey !== 'string') return;
    const opt = q.options.find(o => o.key === ansKey);
    if (!opt || !opt.weights) return;
    const pts = opt.weights[winnerKey] || 0;
    const answerLabel = ANSWER_LABELS[q.id]?.[ansKey] || ansKey;
    const stance = SENATE_STANCES[winnerKey]?.[q.id]?.[ansKey];
    if (pts >= 3) aligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
    else if (pts <= 1) misaligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
  });

  if (aligned.length > 0) {
    const items = aligned.map(a => {
      const stanceText = a.stance ? ` — ${a.stance}` : '';
      return `<div class="alignment-item"><strong>${a.qLabel}:</strong> you chose <strong>${a.answerLabel}</strong>${stanceText}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block positive">
        <div class="alignment-header"><span class="alignment-icon">✓</span> Where else ${winnerFirst} matches you</div>
        ${items}
      </div>`
    });
  }

  if (misaligned.length > 0) {
    const items = misaligned.map(m => {
      let note;
      if (m.stance) {
        note = ` — ${m.stance}`;
      } else {
        const q = SENATE_QUESTIONS.find(qq => QUESTION_LABELS[qq.id] === m.qLabel);
        if (q) {
          const ansKey = state.answers[q.id];
          const opt = q.options.find(o => o.key === ansKey);
          if (opt?.weights) {
            const eligible = getEligibleSenateCandidates();
            const topScorer = Object.entries(opt.weights).filter(([k]) => eligible.includes(k)).sort((a, b) => b[1] - a[1])[0];
            if (topScorer && topScorer[0] !== winnerKey) {
              note = ` — ${lastName(SENATE[topScorer[0]].name)} would have scored higher on this dimension.`;
            } else note = `.`;
          } else note = `.`;
        } else note = `.`;
      }
      return `<div class="alignment-item"><strong>${m.qLabel}:</strong> you chose <strong>${m.answerLabel}</strong>${note}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block negative">
        <div class="alignment-header"><span class="alignment-icon">!</span> Where you and ${winnerFirst} don't fully line up</div>
        ${items}
        <div class="alignment-item" style="margin-top: 8px; font-style: italic; color: #666;">${winnerFirst} still scored highest overall — your other priorities outweighed these gaps.</div>
      </div>`
    });
  }

  // Head-to-head
  const winnerScore = sorted[0][1];
  const runnerScore = sorted[1][1];
  const runnerName = lastName(SENATE[runnerKey].name);
  const vsDetail = buildSenateHeadToHead(winnerKey, runnerKey);
  reasons.push({
    q: null,
    html: `<div class="vs-box">
      <div class="vs-header">Why ${winnerFirst}, not ${runnerName}?</div>
      <div class="vs-body">Your answers pointed more often to ${winnerFirst}. ${vsDetail}</div>
    </div>`
  });

  return reasons;
}

function buildSenateHeadToHead(winnerKey, runnerKey) {
  const diffs = [];
  SENATE_QUESTIONS.forEach(q => {
    if (q.id === 'redflag') return;
    const ans = state.answers[q.id];
    if (!ans) return;
    if (q.multi && Array.isArray(ans)) {
      let wt = 0, rt = 0;
      ans.forEach((key, idx) => {
        const opt = q.options.find(o => o.key === key);
        if (!opt?.weights) return;
        const mult = RANK_MULTIPLIERS[idx] || 0;
        wt += (opt.weights[winnerKey] || 0) * mult;
        rt += (opt.weights[runnerKey] || 0) * mult;
      });
      const diff = Math.round(wt - rt);
      if (Math.abs(diff) >= 1) {
        const topKey = ans[0];
        diffs.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel: ANSWER_LABELS[q.id]?.[topKey] || topKey, diff });
      }
    } else if (typeof ans === 'string') {
      const opt = q.options.find(o => o.key === ans);
      if (!opt?.weights) return;
      const diff = (opt.weights[winnerKey] || 0) - (opt.weights[runnerKey] || 0);
      if (Math.abs(diff) >= 1) diffs.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel: ANSWER_LABELS[q.id]?.[ans] || ans, diff });
    }
  });
  return buildVsNarrative(diffs, lastName(SENATE[winnerKey].name), lastName(SENATE[runnerKey].name));
}

function buildHouseReasons(winnerKey) {
  const reasons = [];
  const houseQs = HOUSE_QUESTIONS_BY_DISTRICT[state.district] || [];
  const district = HOUSE[state.district];
  if (!district) return reasons;
  const winnerObj = district.candidates[winnerKey];
  const winnerFirst = lastName(winnerObj.name);

  // About
  reasons.push({ q: `About ${winnerFirst}`, body: winnerObj.oneLiner });

  // Alignment walk
  const aligned = [];
  const misaligned = [];
  houseQs.forEach(q => {
    const ansKey = state.answers[q.id];
    if (!ansKey || typeof ansKey !== 'string') return;
    const opt = q.options.find(o => o.key === ansKey);
    if (!opt?.weights) return;
    const pts = opt.weights[winnerKey] || 0;
    const answerLabel = ANSWER_LABELS[q.id]?.[ansKey] || ansKey;
    const stance = HOUSE_STANCES[winnerKey]?.[q.id]?.[ansKey];
    if (pts >= 3) aligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
    else if (pts <= 1) misaligned.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel, stance });
  });

  if (aligned.length > 0) {
    const items = aligned.map(a => {
      const stanceText = a.stance ? ` — ${a.stance}` : '';
      return `<div class="alignment-item"><strong>${a.qLabel}:</strong> you chose <strong>${a.answerLabel}</strong>${stanceText}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block positive">
        <div class="alignment-header"><span class="alignment-icon">✓</span> Where ${winnerFirst} matches you</div>
        ${items}
      </div>`
    });
  }

  if (misaligned.length > 0) {
    const items = misaligned.map(m => {
      let note;
      if (m.stance) note = ` — ${m.stance}`;
      else note = `.`;
      return `<div class="alignment-item"><strong>${m.qLabel}:</strong> you chose <strong>${m.answerLabel}</strong>${note}</div>`;
    }).join('');
    reasons.push({
      q: null,
      html: `<div class="alignment-block negative">
        <div class="alignment-header"><span class="alignment-icon">!</span> Where you and ${winnerFirst} don't fully line up</div>
        ${items}
      </div>`
    });
  }

  // Head-to-head
  const scores = computeHouseScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (sorted.length >= 2) {
    const runnerKey = sorted[1][0];
    const runnerFirst = lastName(district.candidates[runnerKey].name);
    const diffs = [];
    houseQs.forEach(q => {
      const ans = state.answers[q.id];
      if (!ans || typeof ans !== 'string') return;
      const opt = q.options.find(o => o.key === ans);
      if (!opt?.weights) return;
      const diff = (opt.weights[winnerKey] || 0) - (opt.weights[runnerKey] || 0);
      if (Math.abs(diff) >= 1) diffs.push({ qLabel: QUESTION_LABELS[q.id] || q.id, answerLabel: ANSWER_LABELS[q.id]?.[ans] || ans, diff });
    });
    const vsDetail = buildVsNarrative(diffs, winnerFirst, runnerFirst);
    reasons.push({
      q: null,
      html: `<div class="vs-box">
        <div class="vs-header">Why ${winnerFirst}, not ${runnerFirst}?</div>
        <div class="vs-body">Your answers pointed more often to ${winnerFirst}. ${vsDetail}</div>
      </div>`
    });
  }

  return reasons;
}

function buildVsNarrative(diffs, winnerFirst, runnerFirst) {
  const winnerAdv = diffs.filter(d => d.diff > 0).sort((a, b) => b.diff - a.diff);
  const runnerAdv = diffs.filter(d => d.diff < 0).sort((a, b) => a.diff - b.diff);
  if (winnerAdv.length === 0) {
    return `Your answers were split almost evenly. The win comes from small accumulated edges rather than one big difference.`;
  }
  const top = winnerAdv[0];
  let text = `The biggest edge was on <strong>${top.qLabel.toLowerCase()}</strong> — ${winnerFirst} lined up more closely with your answer than ${runnerFirst}.`;
  const more = winnerAdv.slice(1, 3);
  if (more.length > 0) text += ` ${winnerFirst} also edged ahead on ${more.map(d => d.qLabel.toLowerCase()).join(' and ')}.`;
  const sigRunner = runnerAdv.filter(d => Math.abs(d.diff) >= 2);
  if (sigRunner.length > 0) text += ` ${runnerFirst} did score higher on <strong>${sigRunner[0].qLabel.toLowerCase()}</strong>, but not by enough to close the overall gap.`;
  return text;
}

      <p class="briefing-cta-hint">Everything this match is based on: records, plans, complaints, sources.</p>
    </div>
    <div class="restart-wrap">
      <button class="restart-btn" onclick="restart()">Start Over</button>
    </div>
    <p class="footer">This match reflects alignment between your priorities and each candidate's public record and plan depth. Not a prediction. Not a recommendation.</p>
  </div>
  `;

  app.innerHTML = html;
}

function toggleScores(which) {
  state.showScores[which] = !state.showScores[which];
  render();
}

function toggleMethod() {
  state.showMethod = !state.showMethod;
  render();
}

function openBriefing() {
  const el = document.getElementById('briefing');
  const content = document.getElementById('briefingContent');
  if (!content.innerHTML.trim()) content.innerHTML = buildBriefing();
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeBriefing() {
  document.getElementById('briefing').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeBriefing();
});

// Build the interpretive part of the economic reference (AI question, glossary, sources).
// The side-by-side tables live on the landing page; this content is appended to the briefing overlay.
function buildEconContext() {
  let html = '';
  html += `<h1>Economic Context — Supplementary Reference</h1>`;
  html += `<p class="lead">The side-by-side tables on the landing page show what changed between the end of 2024 and April 2026. This section adds the interpretive context: why AI investment is a mixed bag, what the key terms mean, and where the data comes from.</p>`;

  html += `<div class="section-kicker">§ A — The AI Question</div>`;
  html += `<h2>Why AI investment is both a positive and a negative</h2>`;
  html += `<p class="lead">Headline economic numbers (GDP, stock market, venture capital flow) have been propped up substantially by AI infrastructure investment. But AI's costs — to electricity bills, water supplies, land use, and employment — are not captured in those same metrics. A fair accounting includes both.</p>`;
  html += `<h3>What AI is adding</h3>`;
  html += `<p>AI data center construction and chip manufacturing have driven hundreds of billions in capital investment. This creates construction jobs, generates tax revenue for some host communities, and is the largest single reason U.S. GDP growth has held up in 2025 and 2026 despite headwinds elsewhere.</p>`;
  html += `<h3>What AI is extracting</h3>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Electricity</span>U.S. data centers now consume about 4.4% of all U.S. electricity, up from 1.9% in 2018, and could reach 12% by 2028. Residential rates across 13 states are projected to rise 20% in summer 2026 and 30–60% by 2030 due to data center demand.</div>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Water</span>Large data centers can consume up to 5 million gallons of water per day — equivalent to a town of 10,000–50,000 people. More than 160 AI data centers have been built in water-scarce regions over the past three years.</div>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Land</span>Data center permits have been approved on farmland and wetlands. Between March and June 2025, community opposition blocked or delayed $98 billion in projects. Over 30 states have introduced 300+ bills on data center regulation in 2026.</div>`;
  html += `<div class="econ-callout-box"><span class="econ-callout-box-label">Employment</span>Tech layoffs directly attributed to AI reached ~55,000 in 2025; modeling estimates put the true number at 200,000–300,000. Young workers are being hit hardest — a 14% drop in the job-finding rate in AI-exposed occupations, and a 16% fall in employment for ages 22–25 in those fields.</div>`;
  html += `<h3>Why this matters for voting</h3>`;
  html += `<p>Different policies push AI's costs onto different groups:</p>`;
  html += `<ul>
    <li><strong>Tax incentives</strong> for data centers shift costs from corporations to residents.</li>
    <li><strong>Permitting authority</strong> at local vs. state level determines who controls where data centers are built.</li>
    <li><strong>Utility rate rules</strong> determine whether households subsidize data center power use.</li>
    <li><strong>Worker retraining and unemployment insurance</strong> programs determine the safety net for those displaced by automation.</li>
    <li><strong>Environmental review</strong> requirements determine whether wetlands, farmland, and water supplies are protected.</li>
  </ul>`;
  html += `<p>Candidates at every level take positions on these questions. Those positions shape who bears AI's costs and who captures its benefits.</p>`;

  html += `<div class="section-kicker">§ B — Glossary</div>`;
  html += `<h2>Economic terms and acronyms</h2>`;
  const glossary = [
    ['CPI (Consumer Price Index)', 'The main measure of inflation in the U.S. Tracks the average change in prices for a "basket" of everyday goods and services — food, gas, rent, medical care, clothing. Published monthly by the Bureau of Labor Statistics.'],
    ['YoY (Year-over-Year)', 'A comparison between a data point today and the same data point 12 months ago. "Gas prices up 29.5% YoY" means gas costs 29.5% more than it did one year ago.'],
    ['GDP (Gross Domestic Product)', 'The total dollar value of all goods and services produced. "GDP growth" of 2.2% means the economy produced 2.2% more than the previous year, adjusted for inflation. 2–3% is generally healthy.'],
    ['Fed Funds Rate', 'The interest rate the Federal Reserve sets for banks lending to each other overnight. It influences almost every other interest rate — mortgages, credit cards, car loans. Higher rates cool inflation but slow the economy.'],
    ['30-Year Mortgage Rate', 'The average interest rate on a 30-year fixed-rate home loan. A 1-point change (e.g., 7% to 6%) can mean hundreds of dollars a month in payments.'],
    ['Unemployment Rate', 'The percentage of people in the labor force who do not have a job but are actively looking. Does NOT count people who have given up looking.'],
    ['Monthly Job Growth', 'The net number of new jobs added to the economy each month. 150,000–200,000 per month has historically been considered healthy; under 50,000 suggests a weakening labor market.'],
    ['Tariffs', 'Taxes on imported goods. When the U.S. places a tariff on imports, the cost of those goods rises for American buyers. Tariffs implemented in 2025 have been a major driver of inflation.'],
    ['VC (Venture Capital)', 'Money invested in early-stage or high-growth companies. When most U.S. venture capital flows to one region, that region captures most new-company formation.'],
    ['AI Infrastructure Investment', 'Capital spent on data centers, chips (GPUs), model training, and AI-related startups. One of the largest drivers of U.S. economic growth in 2025–2026.'],
    ['Strait of Hormuz', 'A narrow waterway in the Persian Gulf through which about 20 million barrels of oil pass daily. Disruption of shipping during the 2026 U.S.–Iran conflict drove global oil prices — and U.S. gas prices — sharply higher.']
  ];
  glossary.forEach(([term, def]) => {
    html += `<div class="econ-glossary-item"><span class="econ-glossary-term">${term}</span><div class="econ-glossary-def">${def}</div></div>`;
  });

  html += `<div class="section-kicker">§ C — Sources & Methodology</div>`;
  html += `<h2>Where the economic data comes from</h2>`;
  html += `<p>All figures were compiled in April 2026 from publicly available sources:</p>`;
  html += `<ul>
    <li>U.S. Bureau of Labor Statistics (CPI, unemployment, employment)</li>
    <li>Freddie Mac Primary Mortgage Market Survey (mortgage rates)</li>
    <li>U.S. Energy Information Administration and AAA (gas & diesel prices)</li>
    <li>USDA Economic Research Service (food prices)</li>
    <li>Federal Reserve (interest rates)</li>
    <li>Kentucky Chamber of Commerce, UK Center for Business and Economic Research, KYSTATS (Kentucky data)</li>
    <li>IMF Article IV Consultation for the United States (April 2026)</li>
    <li>Deloitte, KPMG, Vanguard, U.S. Bank economic forecasts</li>
    <li>Lincoln Institute, Consumer Reports, Environmental Law Institute (data center impacts)</li>
    <li>Anthropic labor market research, Harvard Business Review, Fortune (AI employment impact)</li>
  </ul>`;
  html += `<h3>A note on "better" vs. "worse"</h3>`;
  html += `<p>The labels reflect factual impact on household affordability, job availability, and cost of living. Rising home prices are labeled "Worse" because they make homes less affordable for buyers. Rising gas, grocery, or energy prices are labeled "Worse" because they reduce household purchasing power.</p>`;
  html += `<h3>What this reference does not cover</h3>`;
  html += `<p>This reference does not assess specific candidates, rank parties, or predict future elections. It compares economic indicators at two points in time and notes the federal administration during each period.</p>`;

  return html;
}
